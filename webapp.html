<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши даты 💕</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c8495a;
    --blush: #f7e8ec;
    --cream: #fdf6f0;
    --gold: #c9a96e;
    --dark: #2c1a1a;
    --soft: #9e7070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, var(--rose), #a03348);
    color: white;
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '♥';
    position: absolute;
    font-size: 120px;
    opacity: 0.07;
    top: -20px;
    right: -10px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  header p {
    font-size: 13px;
    opacity: 0.85;
    margin-top: 4px;
    font-weight: 300;
  }

  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: white;
    border-bottom: 1px solid #f0e0e5;
  }

  .nav-btn {
    background: var(--blush);
    border: none;
    color: var(--rose);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover { background: var(--rose); color: white; }

  .month-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--dark);
    text-transform: capitalize;
  }

  .calendar-grid {
    padding: 16px;
    background: white;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 8px;
  }

  .weekdays span {
    font-size: 11px;
    font-weight: 400;
    color: var(--soft);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 0;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    font-weight: 300;
  }

  .day:hover { background: var(--blush); }

  .day.today {
    background: var(--rose);
    color: white;
    font-weight: 700;
  }

  .day.has-event::after {
    content: '♥';
    position: absolute;
    bottom: 1px;
    font-size: 8px;
    color: var(--gold);
  }

  .day.today.has-event::after { color: #ffd4dc; }

  .day.empty { cursor: default; }

  .events-section {
    padding: 16px;
    margin-top: 8px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--dark);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
  }

  .event-card {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 3px solid var(--rose);
    box-shadow: 0 2px 12px rgba(200,73,90,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-date-badge {
    background: var(--blush);
    color: var(--rose);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    min-width: 48px;
    font-family: 'Playfair Display', serif;
  }

  .event-date-badge .day-num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .event-date-badge .month-short {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'Lato', sans-serif;
  }

  .event-info { flex: 1; }

  .event-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 3px;
  }

  .event-days-left {
    font-size: 12px;
    color: var(--soft);
    font-weight: 300;
  }

  .event-days-left.today { color: var(--rose); font-weight: 700; }

  .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
  }

  .delete-btn:hover { color: var(--rose); }

  .add-form {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin: 0 16px 16px;
    box-shadow: 0 2px 16px rgba(200,73,90,0.1);
  }

  .add-form h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--dark);
    margin-bottom: 14px;
  }

  .form-group {
    margin-bottom: 12px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--soft);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #f0e0e5;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Lato', sans-serif;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus { border-color: var(--rose); }

  .add-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--rose), #a03348);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Playfair Display', serif;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }

  .add-btn:hover { opacity: 0.9; }

  .no-events {
    text-align: center;
    color: var(--soft);
    font-size: 14px;
    padding: 24px;
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  .upcoming-badge {
    background: linear-gradient(135deg, var(--gold), #b8935a);
    color: white;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 6px;
    font-family: 'Lato', sans-serif;
    font-weight: 400;
  }
</style>
</head>
<body>

<header>
  <h1>💕 Наши даты</h1>
  <p>Памятные моменты нашей любви</p>
</header>

<div class="calendar-nav">
  <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
  <span class="month-title" id="monthTitle"></span>
  <button class="nav-btn" onclick="changeMonth(1)">›</button>
</div>

<div class="calendar-grid">
  <div class="weekdays">
    <span>Пн</span><span>Вт</span><span>Ср</span>
    <span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div class="events-section">
  <div class="section-title">Все события</div>
  <div id="eventsList"></div>
</div>

<div class="add-form">
  <h3>✨ Добавить дату</h3>
  <div class="form-group">
    <label>Название события</label>
    <input type="text" id="eventName" placeholder="Наш первый поцелуй...">
  </div>
  <div class="form-group">
    <label>Дата</label>
    <input type="date" id="eventDate">
  </div>
  <button class="add-btn" onclick="addEvent()">Сохранить дату 💕</button>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const MONTHS_SHORT = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

  let currentDate = new Date();
  let events = JSON.parse(localStorage.getItem('loveEvents') || '[]');

  function saveEvents() {
    localStorage.setItem('loveEvents', JSON.stringify(events));
  }

  function getDaysUntil(dateStr) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const eventDate = new Date(dateStr);
    const thisYear = new Date(today.getFullYear(), eventDate.getMonth(), eventDate.getDate());
    if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
    const diff = Math.round((thisYear - today) / (1000*60*60*24));
    if (diff === 0) return { text: '🎉 Сегодня!', cls: 'today' };
    if (diff === 1) return { text: 'Завтра!', cls: '' };
    return { text: `через ${diff} дней`, cls: '' };
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthTitle').textContent = `${MONTHS[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const eventDays = new Set(events.map(e => {
      const d = new Date(e.date);
      if (d.getMonth() === month && d.getFullYear() === year) return d.getDate();
      return null;
    }).filter(Boolean));

    let html = '';
    for (let i = 0; i < offset; i++) html += `<div class="day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
      const hasEvent = eventDays.has(d);
      html += `<div class="day${isToday?' today':''}${hasEvent?' has-event':''}">${d}</div>`;
    }
    document.getElementById('daysGrid').innerHTML = html;
  }

  function renderEvents() {
    const list = document.getElementById('eventsList');
    if (events.length === 0) {
      list.innerHTML = '<div class="no-events">Нет памятных дат... Добавь первую! 💕</div>';
      return;
    }

    const sorted = [...events].sort((a, b) => {
      return getDaysUntil(a.date).text.localeCompare(getDaysUntil(b.date).text);
    });

    list.innerHTML = sorted.map((e, i) => {
      const d = new Date(e.date);
      const until = getDaysUntil(e.date);
      const isUpcoming = getDaysUntil(e.date).text.includes('через') && parseInt(getDaysUntil(e.date).text.match(/\d+/)?.[0]) <= 7;
      return `
        <div class="event-card">
          <div class="event-date-badge">
            <div class="day-num">${d.getDate()}</div>
            <div class="month-short">${MONTHS_SHORT[d.getMonth()]}</div>
          </div>
          <div class="event-info">
            <div class="event-name">${e.name}${isUpcoming ? '<span class="upcoming-badge">скоро</span>' : ''}</div>
            <div class="event-days-left ${until.cls}">${until.text}</div>
          </div>
          <button class="delete-btn" onclick="deleteEvent(${events.indexOf(e)})">×</button>
        </div>
      `;
    }).join('');
  }

  function addEvent() {
    const name = document.getElementById('eventName').value.trim();
    const date = document.getElementById('eventDate').value;
    if (!name || !date) { alert('Заполни название и дату!'); return; }
    events.push({ name, date });
    saveEvents();
    document.getElementById('eventName').value = '';
    document.getElementById('eventDate').value = '';
    renderCalendar();
    renderEvents();
  }

  function deleteEvent(index) {
    if (confirm('Удалить эту дату?')) {
      events.splice(index, 1);
      saveEvents();
      renderCalendar();
      renderEvents();
    }
  }

  function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    renderCalendar();
  }

  renderCalendar();
  renderEvents();
</script>
</body>
</html>
