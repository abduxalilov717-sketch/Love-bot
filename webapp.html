<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Любовь</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0d0208;color:#f5e6ea;font-family:'Montserrat',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:pulse 8s ease-in-out infinite}
.orb1{width:300px;height:300px;background:#c8495a;opacity:.15;top:-100px;right:-100px}
.orb2{width:200px;height:200px;background:#9b2335;opacity:.12;bottom:-50px;left:-50px;animation-delay:3s}
@keyframes pulse{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.22;transform:scale(1.1)}}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;color:#c8495a;opacity:0;animation:rise linear infinite}
@keyframes rise{0%{opacity:0;transform:translateY(100vh) scale(.5)}10%{opacity:.6}90%{opacity:.3}100%{opacity:0;transform:translateY(-20px) scale(1.2)}}
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:40px 28px;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center}
.heart{font-size:52px;margin-bottom:8px;animation:heartbeat 2s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(200,73,90,.8))}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.08)}60%{transform:scale(1)}}
.subtitle{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#c8495a;margin-bottom:40px;font-weight:300}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(200,73,90,.2);border-radius:20px;padding:36px 28px;margin-bottom:24px;position:relative;backdrop-filter:blur(10px);box-shadow:0 0 60px rgba(200,73,90,.08),inset 0 1px 0 rgba(255,255,255,.06)}
.qmark{position:absolute;top:-16px;left:28px;font-family:'Cormorant Garamond',serif;font-size:80px;color:#c8495a;line-height:1;opacity:.4}
.qtext{font-family:'Cormorant Garamond',serif;font-size:22px;line-height:1.7;font-style:italic;font-weight:300;color:#f5e6ea;text-align:center;margin-bottom:20px;min-height:80px;display:flex;align-items:center;justify-content:center;transition:opacity .4s ease}
.qauthor{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#c8495a;text-align:center;font-weight:300;opacity:.8}
.divider{width:40px;height:1px;background:linear-gradient(to right,transparent,#c8495a,transparent);margin:16px auto}
.date{font-size:11px;color:rgba(245,230,234,.3);text-align:center;letter-spacing:2px;margin-bottom:32px;font-weight:200}
.btn{background:linear-gradient(135deg,#c8495a,#8b1a2a);color:white;border:none;padding:14px 36px;border-radius:50px;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-family:'Montserrat',sans-serif;font-weight:300;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 30px rgba(200,73,90,.3);margin-bottom:16px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(200,73,90,.5)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.footer{font-size:10px;color:rgba(245,230,234,.2);letter-spacing:2px;text-align:center;font-weight:200}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.container>*{animation:fadeUp .8s ease forwards}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="particles" id="particles"></div>
<div class="container">
  <div class="heart">♥</div>
  <div class="subtitle">Цитата о любви</div>
  <div class="card">
    <span class="qmark">"</span>
    <div class="qtext" id="qtext">Загружаю...</div>
    <div class="divider"></div>
    <div class="qauthor" id="qauthor">...</div>
  </div>
  <div class="date" id="date"></div>
  <button class="btn" id="btn" onclick="load()">✦ Новая цитата</button>
  <div class="footer">с любовью для тебя ♥</div>
</div>
<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const FB=[
  {t:"Любовь — это когда счастье другого важнее твоего собственного.",a:"Г. Джексон Браун"},
  {t:"Настоящая любовь начинается там, где ничего не ожидают взамен.",a:"Антуан де Сент-Экзюпери"},
  {t:"Любовь — это не смотреть друг на друга, а смотреть вместе в одном направлении.",a:"Антуан де Сент-Экзюпери"},
  {t:"Любовь не смотрит глазами, а сердцем.",a:"Уильям Шекспир"},
  {t:"Где нет любви, нет и красоты.",a:"Пауло Коэльо"},
  {t:"Каждый раз, когда я смотрю на тебя, я влюбляюсь снова.",a:""},
  {t:"Ты делаешь каждый мой день лучше просто тем, что существуешь.",a:""},
  {t:"В мире нет ничего лучше, чем любить и быть любимым.",a:"Джордж Элиот"},
];
function getDate(){
  const d=new Date();
  const days=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}
function set(t,a){
  const el=document.getElementById('qtext');
  el.style.opacity='0';
  setTimeout(()=>{el.textContent=t;el.style.opacity='1';},300);
  document.getElementById('qauthor').textContent=a?'— '+a:'';
}
async function load(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='✦ Загружаю...';
  try{
    const r=await fetch('https://api.quotable.io/random?tags=love&maxLength=200');
    if(r.ok){const d=await r.json();set(d.content,''+d.author);}
    else throw 0;
  }catch{
    const q=FB[Math.floor(Math.random()*FB.length)];
    set(q.t,q.a);
  }
  btn.disabled=false;btn.textContent='✦ Новая цитата';
}
function particles(){
  const c=document.getElementById('particles');
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=['♥','❤','♡'][Math.floor(Math.random()*3)];
    p.style.left=Math.random()*100+'%';
    p.style.fontSize=(8+Math.random()*10)+'px';
    p.style.animationDuration=(6+Math.random()*10)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    c.appendChild(p);
  }
}
document.getElementById('date').textContent=getDate();
particles();
load();
</script>
</body>
</html>
