<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Любовь 💕</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #0d0208;
  color: #f5e6ea;
  font-family: 'Montserrat', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated background particles */
.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.particle {
  position: absolute;
  color: #c8495a;
  font-size: 10px;
  opacity: 0;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { opacity: 0; transform: translateY(100vh) scale(0.5); }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-20px) scale(1.2); }
}

/* Glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  pointer-events: none;
  animation: pulse 8s ease-in-out infinite;
}

.orb1 {
  width: 300px; height: 300px;
  background: #c8495a;
  top: -100px; right: -100px;
  animation-delay: 0s;
}

.orb2 {
  width: 200px; height: 200px;
  background: #9b2335;
  bottom: -50px; left: -50px;
  animation-delay: 3s;
}

.orb3 {
  width: 150px; height: 150px;
  background: #d4a0aa;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: 6s;
}

@keyframes pulse {
  0%, 100% { opacity: 0.12; transform: scale(1); }
  50% { opacity: 0.22; transform: scale(1.1); }
}

/* Main content */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 40px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  justify-content: center;
}

.heart-icon {
  font-size: 48px;
  margin-bottom: 8px;
  animation: heartbeat 2s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(200,73,90,0.8));
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.15); }
  30% { transform: scale(1); }
  45% { transform: scale(1.08); }
  60% { transform: scale(1); }
}

.subtitle {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #c8495a;
  margin-bottom: 40px;
  font-weight: 300;
}

.quote-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,73,90,0.2);
  border-radius: 20px;
  padding: 36px 28px;
  margin-bottom: 24px;
  position: relative;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 60px rgba(200,73,90,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
  transition: all 0.6s ease;
}

.quote-card.loading {
  opacity: 0.5;
}

.quote-mark-top {
  position: absolute;
  top: -16px;
  left: 28px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 80px;
  color: #c8495a;
  line-height: 1;
  opacity: 0.4;
}

.quote-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  line-height: 1.7;
  font-style: italic;
  font-weight: 300;
  color: #f5e6ea;
  text-align: center;
  margin-bottom: 20px;
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease;
}

.quote-author {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #c8495a;
  text-align: center;
  font-weight: 300;
  opacity: 0.8;
}

.divider {
  width: 40px;
  height: 1px;
  background: linear-gradient(to right, transparent, #c8495a, transparent);
  margin: 16px auto;
}

.date-text {
  font-size: 11px;
  color: rgba(245,230,234,0.3);
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 32px;
  font-weight: 200;
}

.btn-new {
  background: linear-gradient(135deg, #c8495a, #8b1a2a);
  color: white;
  border: none;
  padding: 14px 36px;
  border-radius: 50px;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 30px rgba(200,73,90,0.3);
  margin-bottom: 16px;
}

.btn-new:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(200,73,90,0.5);
}

.btn-new:active {
  transform: translateY(0);
}

.btn-new:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.footer-text {
  font-size: 10px;
  color: rgba(245,230,234,0.2);
  letter-spacing: 2px;
  text-align: center;
  font-weight: 200;
}

/* Loading animation */
@keyframes shimmer {
  0% { opacity: 0.3; }
  50% { opacity: 0.7; }
  100% { opacity: 0.3; }
}

.loading-text {
  animation: shimmer 1.5s ease-in-out infinite;
}

/* Fade in animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.container > * {
  animation: fadeUp 0.8s ease forwards;
}

.heart-icon { animation-delay: 0.1s; }
.subtitle { animation-delay: 0.2s; }
.quote-card { animation-delay: 0.3s; }
.date-text { animation-delay: 0.4s; }
.btn-new { animation-delay: 0.5s; }
.footer-text { animation-delay: 0.6s; }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="heart-icon">♥</div>
  <div class="subtitle">Цитата о любви</div>

  <div class="quote-card" id="quoteCard">
    <span class="quote-mark-top">"</span>
    <div class="quote-text" id="quoteText">
      <span class="loading-text">Загружаю цитату...</span>
    </div>
    <div class="divider"></div>
    <div class="quote-author" id="quoteAuthor">...</div>
  </div>

  <div class="date-text" id="dateText"></div>

  <button class="btn-new" id="newBtn" onclick="loadQuote()">✦ Новая цитата</button>
  <div class="footer-text">с любовью для тебя ♥</div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // Запасные цитаты
  const FALLBACK = [
    { text: "Любовь — это когда счастье другого человека важнее твоего собственного.", author: "Г. Джексон Браун" },
    { text: "Любить — значит находить в счастье другого своё собственное счастье.", author: "Готфрид Лейбниц" },
    { text: "Настоящая любовь начинается там, где ничего не ожидают взамен.", author: "Антуан де Сент-Экзюпери" },
    { text: "Любовь — это не смотреть друг на друга, а смотреть вместе в одном направлении.", author: "Антуан де Сент-Экзюпери" },
    { text: "Где нет любви, нет и красоты.", author: "Пауло Коэльо" },
    { text: "Любовь — это единственное, что растёт, когда ты её отдаёшь.", author: "Рик Стокс" },
    { text: "Ты — мой дом, моя гавань, моё всё.", author: "" },
    { text: "Каждый раз, когда я смотрю на тебя, я влюбляюсь снова.", author: "" },
    { text: "Любовь не смотрит глазами, а сердцем.", author: "Уильям Шекспир" },
    { text: "В мире нет ничего лучше, чем любить и быть любимым.", author: "Джордж Элиот" },
  ];

  function getDate() {
    const d = new Date();
    const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
    const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function setQuote(text, author) {
    const el = document.getElementById('quoteText');
    const au = document.getElementById('quoteAuthor');
    el.style.opacity = '0';
    setTimeout(() => {
      el.textContent = text;
      au.textContent = author || '— неизвестный автор';
      el.style.opacity = '1';
      el.style.transition = 'opacity 0.5s ease';
    }, 300);
  }

  async function loadQuote() {
    const btn = document.getElementById('newBtn');
    btn.disabled = true;
    btn.textContent = '✦ Загружаю...';

    try {
      const res = await fetch('https://api.quotable.io/random?tags=love&maxLength=200');
      if (res.ok) {
        const data = await res.json();
        setQuote(data.content, '— ' + data.author);
      } else {
        throw new Error('API error');
      }
    } catch {
      const q = FALLBACK[Math.floor(Math.random() * FALLBACK.length)];
      setQuote(q.text, q.author ? '— ' + q.author : '');
    }

    btn.disabled = false;
    btn.textContent = '✦ Новая цитата';
  }

  // Создаём частицы
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = ['♥','❤','♡'][Math.floor(Math.random()*3)];
      p.style.left = Math.random() * 100 + '%';
      p.style.fontSize = (8 + Math.random() * 10) + 'px';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.opacity = Math.random() * 0.5;
      container.appendChild(p);
    }
  }

  document.getElementById('dateText').textContent = getDate();
  createParticles();
  loadQuote();
</script>
</body>
</html>
