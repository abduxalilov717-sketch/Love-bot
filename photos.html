<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши фото 💕</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0208;color:#f5e6ea;font-family:'Montserrat',sans-serif;min-height:100vh}
header{padding:32px 20px 20px;text-align:center;background:linear-gradient(180deg,rgba(200,73,90,.15),transparent)}
.heart{font-size:36px;animation:beat 2s ease-in-out infinite;filter:drop-shadow(0 0 15px rgba(200,73,90,.8));display:block;margin-bottom:8px}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;font-weight:300;color:#f5e6ea;margin-bottom:4px}
.sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#c8495a;font-weight:200}
.count-badge{display:inline-block;background:rgba(200,73,90,.2);border:1px solid rgba(200,73,90,.3);color:#c8495a;font-size:10px;padding:3px 10px;border-radius:20px;letter-spacing:2px;margin-top:8px}
.loading{text-align:center;padding:60px 20px;color:rgba(245,230,234,.4);font-size:16px;font-style:italic;font-family:'Cormorant Garamond',serif}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;display:block;margin-bottom:16px;opacity:.3}
.empty-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:rgba(245,230,234,.4)}
.empty-hint{font-size:11px;color:rgba(200,73,90,.6);margin-top:8px;letter-spacing:2px}
.gallery{padding:16px;columns:2;gap:10px}
.photo-item{break-inside:avoid;margin-bottom:10px;position:relative;border-radius:12px;overflow:hidden;cursor:pointer;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.photo-item img{width:100%;display:block;border-radius:12px;border:1px solid rgba(200,73,90,.2)}
.photo-caption{position:absolute;bottom:0;left:0;right:0;padding:20px 8px 8px;background:linear-gradient(transparent,rgba(13,2,8,.85));font-size:13px;color:#f5e6ea;text-align:center;font-style:italic;font-family:'Cormorant Garamond',serif}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:100;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.modal.active{display:flex}
.modal img{max-width:100%;max-height:75vh;border-radius:12px;object-fit:contain}
.modal-caption{margin-top:16px;font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:#f5e6ea;text-align:center}
.modal-date{font-size:10px;color:rgba(200,73,90,.7);letter-spacing:2px;margin-top:6px;text-align:center}
.modal-close{position:absolute;top:20px;right:20px;background:rgba(200,73,90,.3);border:none;color:white;width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer}
.footer{text-align:center;padding:24px;font-size:10px;color:rgba(245,230,234,.15);letter-spacing:2px}
</style>
</head>
<body>
<header>
  <span class="heart">♥</span>
  <h1>Наши моменты</h1>
  <div class="sub">воспоминания которые дороги нам</div>
  <div class="count-badge" id="countBadge">загружаю...</div>
</header>
<div id="content"><div class="loading">Загружаю фотографии...</div></div>
<div class="footer">с любовью ♥</div>
<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close">×</button>
  <img id="modalImg" src="" alt="">
  <div class="modal-caption" id="modalCaption"></div>
  <div class="modal-date" id="modalDate"></div>
</div>
<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const BOT_TOKEN="8782299050:AAGhdm8O1LVXUKdvRzi4Gc4Wp7zjuq-Wl4A";
const BIN_ID="69cf7db6856a682189f67635";
const API_KEY="$2a$10$vrr04luN8fRaLFxvBr09EOjRRIBm75kKW1EQJY7SBhElJaa1KZXUu";

function openModal(url,caption,date){
  document.getElementById('modalImg').src=url;
  document.getElementById('modalCaption').textContent=caption||'';
  document.getElementById('modalDate').textContent=date||'';
  document.getElementById('modal').classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active');}

async function getFileUrl(fileId){
  const r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
  const d=await r.json();
  if(d.ok) return `https://api.telegram.org/file/bot${BOT_TOKEN}/${d.result.file_path}`;
  return null;
}

async function loadPhotos(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
      headers:{"X-Master-Key":API_KEY}
    });
    const data=await r.json();
    const photos=data.record?.photos||[];
    const badge=document.getElementById('countBadge');
    const content=document.getElementById('content');
    if(photos.length===0){
      badge.textContent='0 фото';
      content.innerHTML=`<div class="empty"><span class="empty-icon">📸</span><div class="empty-text">Пока нет фотографий</div><div class="empty-hint">отправь фото боту чтобы добавить</div></div>`;
      return;
    }
    badge.textContent=photos.length+' фото';
    const gallery=document.createElement('div');
    gallery.className='gallery';
    for(const p of photos){
      const url=await getFileUrl(p.file_id);
      if(!url) continue;
      const div=document.createElement('div');
      div.className='photo-item';
      div.onclick=()=>openModal(url,p.caption,p.date);
      div.innerHTML=`<img src="${url}" alt="" loading="lazy">${p.caption?`<div class="photo-caption">${p.caption}</div>`:''}`;
      gallery.appendChild(div);
    }
    content.innerHTML='';
    content.appendChild(gallery);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty"><span class="empty-icon">📸</span><div class="empty-text">Пока нет фотографий</div><div class="empty-hint">отправь фото боту чтобы добавить</div></div>`;
    document.getElementById('countBadge').textContent='0 фото';
  }
}
loadPhotos();
</script>
</body>
</html>
