<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши фото 💕</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0208;color:#f5e6ea;font-family:'Montserrat',sans-serif;min-height:100vh}
header{padding:32px 20px 20px;text-align:center;background:linear-gradient(180deg,rgba(200,73,90,.15),transparent)}
.heart{font-size:36px;animation:beat 2s ease-in-out infinite;filter:drop-shadow(0 0 15px rgba(200,73,90,.8));display:block;margin-bottom:8px}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;font-weight:300;color:#f5e6ea;margin-bottom:4px}
.sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#c8495a;font-weight:200}
.gallery{padding:20px 16px;columns:2;gap:12px}
.photo-item{break-inside:avoid;margin-bottom:12px;position:relative;border-radius:12px;overflow:hidden;cursor:pointer}
.photo-item img{width:100%;display:block;border-radius:12px;transition:transform .3s ease;border:1px solid rgba(200,73,90,.2)}
.photo-item:hover img{transform:scale(1.03)}
.photo-caption{position:absolute;bottom:0;left:0;right:0;padding:20px 10px 10px;background:linear-gradient(transparent,rgba(13,2,8,.8));font-size:11px;color:#f5e6ea;text-align:center;font-style:italic;font-family:'Cormorant Garamond',serif;opacity:0;transition:opacity .3s ease}
.photo-item:hover .photo-caption{opacity:1}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;align-items:center;justify-content:center;flex-direction:column}
.modal.active{display:flex}
.modal img{max-width:95%;max-height:80vh;border-radius:12px;object-fit:contain}
.modal-caption{margin-top:16px;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:#f5e6ea;text-align:center;padding:0 20px}
.modal-close{position:absolute;top:20px;right:20px;background:rgba(200,73,90,.3);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.footer{text-align:center;padding:20px;font-size:10px;color:rgba(245,230,234,.2);letter-spacing:2px}
</style>
</head>
<body>
<header>
  <span class="heart">♥</span>
  <h1>Наши моменты</h1>
  <div class="sub">воспоминания которые дороги нам</div>
</header>

<div class="gallery" id="gallery"></div>
<div class="footer">с любовью ♥</div>

<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">×</button>
  <img id="modalImg" src="" alt="">
  <div class="modal-caption" id="modalCaption"></div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

// ВСТАВЬ СЮДА СВОИ ФОТО — замени ссылки и подписи
const PHOTOS = [
  { url: "https://i.imgur.com/ЗАМЕНИ1.jpg", caption: "Наша первая встреча 💕" },
  { url: "https://i.imgur.com/ЗАМЕНИ2.jpg", caption: "Самый счастливый день" },
  { url: "https://i.imgur.com/ЗАМЕНИ3.jpg", caption: "Я люблю тебя ❤️" },
  { url: "https://i.imgur.com/ЗАМЕНИ4.jpg", caption: "Навсегда вместе" },
];

function openModal(url, caption){
  document.getElementById('modalImg').src=url;
  document.getElementById('modalCaption').textContent=caption;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

const gallery=document.getElementById('gallery');
PHOTOS.forEach(p=>{
  const div=document.createElement('div');
  div.className='photo-item';
  div.onclick=()=>openModal(p.url,p.caption);
  div.innerHTML=`<img src="${p.url}" alt="${p.caption}" loading="lazy"><div class="photo-caption">${p.caption}</div>`;
  gallery.appendChild(div);
});
</script>
</body>
</html>
